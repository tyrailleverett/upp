name: Changelog

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog preview
        if: github.event_name == 'pull_request'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: pr-changelog-preview.md

      - name: Post changelog preview to summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Changelog Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat pr-changelog-preview.md >> $GITHUB_STEP_SUMMARY

      - name: Generate changelog
        if: github.event_name == 'push'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and push changelog
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(changelog): update CHANGELOG.md [skip ci]"
          git push
